<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#bg)" stroke="#e2e8f0" stroke-width="0.5"/>
  <!-- Meridian lines -->
  <ellipse cx="16" cy="16" rx="6" ry="13" fill="none" stroke="#e2e8f0" stroke-width="0.8" opacity="0.4"/>
  <line x1="16" y1="2" x2="16" y2="30" stroke="#e2e8f0" stroke-width="0.8" opacity="0.4"/>
  <line x1="2" y1="16" x2="30" y2="16" stroke="#e2e8f0" stroke-width="0.8" opacity="0.4"/>
  <!-- Compass needle pointing East -->
  <polygon points="16,4 18.5,14 16,12 13.5,14" fill="#f59e0b"/>
  <polygon points="16,28 18.5,18 16,20 13.5,18" fill="#94a3b8"/>
  <!-- E letter for East -->
  <text x="24" y="18.5" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#f59e0b" text-anchor="middle">E</text>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.8" fill="#f59e0b"/>
  <circle cx="16" cy="16" r="0.8" fill="#1a365d"/>
</svg>
